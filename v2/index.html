<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0f14">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg">
<title>Albatil Fitness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#050505;--surface:#131313;--surface2:#1d1d1d;--line:#2b2b2b;--text:#f5f5f5;--muted:#8f8f8f;--accent:#ffffff;--accent-rgb:255,255,255;--accent2:#c7c7c7;--good:#eaeaea;--danger:#ff6b6b;--gold:#d4af37;--gold-rgb:212,175,55;--violet:#9a9a9a;--panel-end:#0e0e0e;--ring-track:#232323;--shadow:0 18px 55px rgba(0,0,0,.5)}
[data-theme="light"]{--bg:#fafafa;--surface:#ffffff;--surface2:#f0f0f0;--line:#dedede;--text:#0a0a0a;--muted:#666666;--accent:#000000;--accent-rgb:0,0,0;--accent2:#3a3a3a;--good:#141414;--danger:#c0392b;--gold:#a9812c;--gold-rgb:169,129,44;--violet:#555555;--panel-end:#f5f5f5;--ring-track:#e2e2e2;--shadow:0 18px 45px rgba(0,0,0,.12)}
*{box-sizing:border-box}
html{background:var(--bg)}
body{margin:0;background:radial-gradient(circle at 50% -10%,#151515 0,#050505 45%);color:var(--text);font-family:"Tajawal",system-ui,-apple-system,"Segoe UI",Tahoma,Arial,sans-serif;min-height:100vh}
[data-theme="light"] body{background:radial-gradient(circle at 50% -10%,#ffffff 0,#fafafa 45%)}
button,input,textarea,select{font:inherit}
button{cursor:pointer}
a{color:var(--accent2)}
a:hover{color:var(--accent)}
#root{min-height:100vh}
@keyframes coachFade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<script src="utils/data.js"></script>
<script src="utils/gamify.js"></script>
<script src="utils/helpers.js"></script>
<script src="services/storage.js"></script>
<script src="services/firebase.js"></script>
<script src="services/ai.js"></script>
<script src="hooks/useAppState.js"></script>
<script src="components/Charts.jsx"></script>
<script src="components/UI.jsx"></script>
<script src="pages/Home.jsx"></script>
<script src="pages/Workouts.jsx"></script>
<script src="pages/Library.jsx"></script>
<script src="pages/ScheduleEditor.jsx"></script>
<script src="pages/Session.jsx"></script>
<script src="pages/Progress.jsx"></script>
<script src="pages/Nutrition.jsx"></script>
<script src="pages/Settings.jsx"></script>
<script src="pages/Coach.jsx"></script>
<script src="App.jsx"></script>

<script>
window.__swReloadForUpdate = function(){
  navigator.serviceWorker.getRegistration().then(reg=>{
    if(reg && reg.waiting) reg.waiting.postMessage('skipWaiting');
  });
  navigator.serviceWorker.addEventListener('controllerchange', ()=>location.reload());
};
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js').then(reg=>{
      reg.addEventListener('updatefound', ()=>{
        const sw = reg.installing;
        sw && sw.addEventListener('statechange', ()=>{
          if(sw.state==='installed' && navigator.serviceWorker.controller){
            window.dispatchEvent(new Event('sw-update-available'));
          }
        });
      });
    }).catch(()=>{});
  });
}
</script>
</body>
</html>
