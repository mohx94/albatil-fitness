<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0f14">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg">
<title>Albatil Fitness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0e14;--surface:#141924;--surface2:#1c2333;--line:#2a3346;--text:#f2f5fb;--muted:#8b95ac;--accent:#ff6b4a;--accent-rgb:255,107,74;--accent2:#4da3ff;--good:#3ddc97;--danger:#ff5c7a;--gold:#ffc857;--gold-rgb:255,200,87;--violet:#8b7bff;--panel-end:#0f131c;--ring-track:#232b3d;--shadow:0 18px 55px rgba(0,0,0,.5)}
[data-theme="light"]{--bg:#f6f7fb;--surface:#ffffff;--surface2:#eef1f8;--line:#dde3ee;--text:#10141f;--muted:#5c6579;--accent:#ff5a36;--accent-rgb:255,90,54;--accent2:#2a7de1;--good:#1f9d6c;--danger:#d63a5c;--gold:#c9922e;--gold-rgb:201,146,46;--violet:#6f5fe0;--panel-end:#f2f4fa;--ring-track:#e4e8f2;--shadow:0 18px 45px rgba(20,30,60,.12)}
*{box-sizing:border-box}
html{background:var(--bg)}
body{margin:0;background:radial-gradient(circle at 50% -10%,#1a2030 0,#0b0e14 45%);color:var(--text);font-family:"Tajawal",system-ui,-apple-system,"Segoe UI",Tahoma,Arial,sans-serif;min-height:100vh}
[data-theme="light"] body{background:radial-gradient(circle at 50% -10%,#ffffff 0,#f6f7fb 45%)}
button,input,textarea,select{font:inherit}
button{cursor:pointer}
a{color:var(--accent2)}
a:hover{color:var(--accent)}
#root{min-height:100vh}
@keyframes coachFade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<script src="pages/Workouts.jsx"></script>

<script src="pages/Nutrition.jsx"></script>
<script src="pages/Settings.jsx"></script>
<script src="pages/Coach.jsx"></script>
<script src="App.jsx"></script>

<script>
window.__swReloadForUpdate = function(){
  navigator.serviceWorker.getRegistration().then(reg=>{
    if(reg && reg.waiting) reg.waiting.postMessage('skipWaiting');
  });
  navigator.serviceWorker.addEventListener('controllerchange', ()=>location.reload());
};
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js').then(reg=>{
      reg.addEventListener('updatefound', ()=>{
        const sw = reg.installing;
        sw && sw.addEventListener('statechange', ()=>{
          if(sw.state==='installed' && navigator.serviceWorker.controller){
            window.dispatchEvent(new Event('sw-update-available'));
          }
        });
      });
    }).catch(()=>{});
  });
}
</script>
</body>
</html>
