<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0f14">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg">
<title>Albatil Fitness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#080b10;--surface:#111722;--surface2:#182233;--line:#26324a;--text:#f2f5f9;--muted:#8b96ad;--accent:#28e0b8;--accent2:#5b8cff;--good:#28e0b8;--danger:#ff6178;--gold:#f4c469;--violet:#8b7bff;--shadow:0 18px 55px rgba(0,10,25,.4)}
[data-theme="light"]{--bg:#f3f5f9;--surface:#ffffff;--surface2:#eef1f6;--line:#dbe1ea;--text:#0f1621;--muted:#5b667a;--shadow:0 18px 45px rgba(20,40,80,.1)}
*{box-sizing:border-box}
html{background:var(--bg)}
body{margin:0;background:radial-gradient(circle at 50% -10%,#152033 0,#080b10 45%);color:var(--text);font-family:"Tajawal",system-ui,-apple-system,"Segoe UI",Tahoma,Arial,sans-serif;min-height:100vh}
[data-theme="light"] body{background:radial-gradient(circle at 50% -10%,#ffffff 0,#f3f5f9 45%)}
button,input,textarea,select{font:inherit}
button{cursor:pointer}
a{color:var(--accent2)}
a:hover{color:var(--accent)}
#root{min-height:100vh}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<script src="utils/data.js"></script>
<script src="utils/helpers.js"></script>
<script src="services/storage.js"></script>
<script src="services/firebase.js"></script>
<script src="services/ai.js"></script>
<script src="hooks/useAppState.js"></script>
<script src="components/Charts.jsx"></script>
<script src="components/UI.jsx"></script>
<script src="pages/Home.jsx"></script>
<script src="pages/Workouts.jsx"></script>
<script src="pages/Library.jsx"></script>
<script src="pages/ScheduleEditor.jsx"></script>
<script src="pages/Session.jsx"></script>
<script src="pages/Progress.jsx"></script>
<script src="pages/Nutrition.jsx"></script>
<script src="pages/Settings.jsx"></script>
<script src="App.jsx"></script>

<script>
window.__swReloadForUpdate = function(){
  navigator.serviceWorker.getRegistration().then(reg=>{
    if(reg && reg.waiting) reg.waiting.postMessage('skipWaiting');
  });
  navigator.serviceWorker.addEventListener('controllerchange', ()=>location.reload());
};
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js').then(reg=>{
      reg.addEventListener('updatefound', ()=>{
        const sw = reg.installing;
        sw && sw.addEventListener('statechange', ()=>{
          if(sw.state==='installed' && navigator.serviceWorker.controller){
            window.dispatchEvent(new Event('sw-update-available'));
          }
        });
      });
    }).catch(()=>{});
  });
}
</script>
</body>
</html>
